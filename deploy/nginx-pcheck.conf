# PCheck – Nginx config for Domain + HTTPS
# Use this when you have a domain (e.g. ilab.psu.palawan.edu.ph) and want students to use https://...
#
# 1. Replace ilab.psu.palawan.edu.ph with your domain.
# 2. Replace the alias paths with your actual PCheck path (keep forward slashes).
# 3. Copy this into your Nginx conf (e.g. nginx/conf/sites/pcheck.conf) or include it from nginx.conf.

server {
    listen 80;
    server_name ilab.psu.palawan.edu.ph;

    location /static/ {
        alias "C:/Users/marka/Desktop/PCHECK PROJECT/PCheck/staticfiles/";
    }
    location /media/ {
        alias "C:/Users/marka/Desktop/PCHECK PROJECT/PCheck/media/";
    }
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
